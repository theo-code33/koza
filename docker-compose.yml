services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Host 5433 → container 5432 (avoids clashing with a local Postgres on 5432)
      - "5433:5432"
    volumes:
      - koza_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx prisma migrate deploy && npx prisma generate && npm run dev"
    ports:
      - "3000:3000"
    environment:
      # On the compose network the database is reachable at db:5432
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  koza_db_data:
