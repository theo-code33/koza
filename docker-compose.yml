services:
  # Dev runs against hosted Prisma Postgres (no local db service).
  # DATABASE_URL comes from .env (see .env.example / `npx prisma postgres link`).
  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run dev"
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
